# SabbathCue dependency audit configuration
# Used by `cargo deny check` in CI

[graph]
targets = ["x86_64-pc-windows-msvc"]

[advisories]
vulnerability = "deny"
unmaintained = "warn"
unsound = "warn"
yanked = "deny"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "ISC",
    "OpenSSL",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
    "Zlib",
    "0BSD",
]
copyleft = "deny"

[[licenses.exceptions]]
name = "rhema-stt"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
name = "rhema-audio"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
name = "rhema-bible"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
name = "rhema-detection"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
name = "rhema-api"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
name = "rhema-broadcast"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
name = "rhema-notes"
allow = ["MPL-2.0"]

[bans]
multiple-versions = "warn"
deny = []
