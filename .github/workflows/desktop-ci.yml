name: Desktop CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test -- --run

      - name: Build frontend
        run: bun run build

  web-docs:
    name: Web docs build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install

      - name: Install web dependencies
        working-directory: web
        run: bun install

      - name: Build web docs
        run: bun run web:build

  rust:
    name: Rust checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install

      - name: Download Bible source data
        run: bun run download:bible-data

      - name: Build public Bible DB
        run: bun run build:bible:public

      - name: Verify public Bible DB
        run: bun run verify:bible:public

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: models/whisper/ggml-base.en.bin
          key: whisper-ggml-base-en

      - name: Download Whisper model
        run: bun run download:whisper

      - name: Cache MiniLM models
        uses: actions/cache@v4
        with:
          path: |
            models/minilm-l6-v2
            models/minilm-l6-v2-int8
          key: minilm-models-${{ hashFiles('data/export-minilm-onnx.py') }}

      - name: Cache embeddings
        uses: actions/cache@v4
        with:
          path: embeddings
          key: minilm-embeddings-${{ hashFiles('data/precompute-embeddings.py') }}

      - name: Prepare MiniLM semantic assets
        run: |
          bun run download:model
          bun run export:verses
          bun run precompute:embeddings

      - name: Check workspace
        working-directory: src-tauri
        run: cargo check --workspace

      - name: Test workspace
        working-directory: src-tauri
        run: cargo test --workspace
